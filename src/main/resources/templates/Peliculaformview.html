<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${accion} + ' película'">Formulario Película</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<header>
    <h1 th:text="${accion} + ' película'">Formulario Película</h1>
</header>

<div class="contenedor">
    <div class="card">
        <form th:action="${pelicula.id != 0}
                        ? @{/peliculas/{id}/editar(id=${pelicula.id})}
                        : @{/peliculas/nuevo}"
            th:object="${pelicula}"
            method="post">

            <div class="form-group">
                <label for="titulo">Título *</label>
                <input type="text" id="titulo" th:field="*{titulo}" placeholder="Título de la película"/>
                <span class="error" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></span>
            </div>

            <div class="form-group">
                <label for="genero">Género <span style="color:#aaa; font-weight:normal">(opcional)</span></label>
                <input type="text" id="genero" th:field="*{genero}" placeholder="Ej: Acción, Comedia..."/>
                <span class="error" th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}"></span>
            </div>

            <div class="form-group">
                <label for="director">Director <span style="color:#aaa; font-weight:normal">(opcional)</span></label>
                <input type="text" id="director" th:field="*{director}" placeholder="Nombre del director"/>
                <span class="error" th:if="${#fields.hasErrors('director')}" th:errors="*{director}"></span>
            </div>

            <div class="form-group">
                <label for="fechaEstreno">Año de estreno <span style="color:#aaa; font-weight:normal">(opcional)</span></label>
                <input type="number" id="fechaEstreno" th:field="*{fechaEstreno}" placeholder="Ej: 2023" min="1888" max="2099"/>
                <span class="error" th:if="${#fields.hasErrors('fechaEstreno')}" th:errors="*{fechaEstreno}"></span>
            </div>

            <div class="form-group">
                <label for="precio">Precio por día (€) *</label>
                <input type="number" id="precio" th:field="*{precio}" placeholder="Ej: 2.50" step="0.01" min="0"/>
                <span class="error" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></span>
            </div>

            <div class="form-group">
                <label for="stock">Stock *</label>
                <input type="number" id="stock" th:field="*{stock}" placeholder="Ej: 5" min="1"/>
                <span class="error" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></span>
            </div>

            <div class="acciones">
                <a th:href="@{/peliculas}" class="btn btn-secondary">← Cancelar</a>
                <button type="submit" class="btn btn-primary" th:text="${accion} + ' película'">Guardar</button>
            </div>
        </form>
    </div>
</div>

<footer>Videoclub — Proyecto Spring Boot 3ª Evaluación</footer>
</body>
</html>
