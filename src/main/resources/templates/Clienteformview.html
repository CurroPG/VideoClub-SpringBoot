<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${accion} + ' cliente'">Formulario Cliente</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<header>
    <h1 th:text="${accion} + ' cliente'">Formulario Cliente</h1>
</header>

<div class="contenedor">
    <div class="card">
        <form th:action="${cliente.id != 0}
                        ? @{/clientes/{id}/editar(id=${cliente.id})}
                        : @{/clientes/nuevo}"
            th:object="${cliente}"
            method="post">

            <div class="form-group">
                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" th:field="*{nombre}" placeholder="Nombre"/>
                <span class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
            </div>

            <div class="form-group">
                <label for="apellido">Apellido *</label>
                <input type="text" id="apellido" th:field="*{apellido}" placeholder="Apellido"/>
                <span class="error" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></span>
            </div>

            <div class="form-group">
                <label for="email">Email <span style="color:#aaa; font-weight:normal">(opcional)</span></label>
                <input type="email" id="email" th:field="*{email}" placeholder="correo@ejemplo.com"/>
                <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono <span style="color:#aaa; font-weight:normal">(opcional)</span></label>
                <input type="tel" id="telefono" th:field="*{telefono}" placeholder="600 000 000"/>
                <span class="error" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></span>
            </div>

            <div class="acciones">
                <a th:href="@{/clientes}" class="btn btn-secondary">← Cancelar</a>
                <button type="submit" class="btn btn-primary" th:text="${accion} + ' cliente'">Guardar</button>
            </div>
        </form>
    </div>
</div>

<footer>Videoclub — Proyecto Spring Boot 3ª Evaluación</footer>
</body>
</html>
